<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drivers · Parth's Pit Wall</title>
  <meta name="description" content="F1 2026 driver profiles with career statistics and season history — Parth's Pit Wall.">
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;0,800;1,400;1,700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --carbon: #0a0a0a;
      --carbon-2: #131313;
      --carbon-3: #1d1d1d;
      --paper: #f2ece0;
      --paper-2: #e8e1d2;
      --paper-3: #d8d0bf;
      --ink: #0a0a0a;
      --ink-2: #4a4438;
      --ink-3: #8a8172;
      --racing: #e10600;
      --racing-hot: #ff2010;
      --gold: #d4a017;
      --rule-light: #d4cec4;
    }

    @keyframes ticker {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }
    @keyframes fadeUpSlow {
      from { opacity: 0; transform: translateY(18px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeSlow { from { opacity: 0; } to { opacity: 1; } }
    @keyframes pulseDot {
      0%, 100% { opacity: 0.5; transform: scale(1); }
      50%       { opacity: 1;   transform: scale(1.2); }
    }
    @keyframes cardReveal {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes modalSlideUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    html { scroll-behavior: smooth; }
    body {
      background: var(--paper);
      color: var(--ink);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* ── NAV ── */
    .site-nav {
      background: var(--carbon);
      height: 48px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      position: sticky;
      top: 0;
      z-index: 200;
      animation: fadeSlow 0.5s ease both;
    }
    .nav-inner {
      max-width: 1440px;
      margin: 0 auto;
      padding: 0 36px;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .nav-logo-link {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }
    .nav-checker {
      width: 26px; height: 16px;
      background:
        linear-gradient(45deg, #fff 25%, transparent 25%, transparent 75%, #fff 75%),
        linear-gradient(45deg, #fff 25%, transparent 25%, transparent 75%, #fff 75%);
      background-size: 6px 6px;
      background-position: 0 0, 3px 3px;
      background-color: #000;
      flex-shrink: 0;
    }
    .nav-brand-text {
      font-family: 'Playfair Display', serif;
      font-size: 15px;
      font-style: italic;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.01em;
    }
    .nav-brand-text em { color: var(--racing-hot); }
    .nav-links { display: flex; height: 100%; }
    .nav-link {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
      text-decoration: none;
      padding: 0 18px;
      display: flex;
      align-items: center;
      position: relative;
      transition: color 0.2s;
      height: 100%;
    }
    .nav-link::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 18px; right: 18px;
      height: 2px;
      background: var(--racing);
      transform: scaleX(0);
      transform-origin: center;
      transition: transform 0.25s ease;
    }
    .nav-link:hover { color: rgba(255,255,255,0.85); }
    .nav-link:hover::after { transform: scaleX(0.5); }
    .nav-link.active { color: #fff; }
    .nav-link.active::after { transform: scaleX(1); }

    /* ── TICKER ── */
    .ticker-wrap {
      background: var(--carbon);
      height: 44px;
      overflow: hidden;
      display: flex;
      align-items: center;
      border-bottom: 2px solid var(--racing);
      position: relative;
      animation: fadeSlow 0.9s ease both;
    }
    .ticker-wrap::before, .ticker-wrap::after {
      content: '';
      position: absolute;
      top: 0; bottom: 0;
      width: 80px;
      z-index: 2;
      pointer-events: none;
    }
    .ticker-wrap::before { left: 0; background: linear-gradient(90deg, var(--carbon), transparent); }
    .ticker-wrap::after  { right: 0; background: linear-gradient(270deg, var(--carbon), transparent); }
    .ticker-track {
      display: flex;
      white-space: nowrap;
      animation: ticker 52s linear infinite;
      will-change: transform;
    }
    .ticker-track:hover { animation-play-state: paused; }
    .tick {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 0 26px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: .08em;
      color: rgba(255,255,255,0.55);
      text-transform: uppercase;
    }
    .tick .sym { color: var(--racing-hot); font-weight: 600; letter-spacing: .14em; }
    .tick .val { color: #fff; font-weight: 600; }
    .tick-dot { color: rgba(255,255,255,.2); padding: 0 4px; font-size: 9px; }

    /* ── HERO ── */
    .drivers-hero {
      max-width: 1440px;
      margin: 0 auto;
      padding: 52px 36px 36px;
      animation: fadeUpSlow 0.8s ease both 0.2s;
    }
    .drivers-eyebrow {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: .24em;
      text-transform: uppercase;
      color: var(--racing);
      font-weight: 600;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .drivers-eyebrow::before {
      content: '';
      width: 7px; height: 7px;
      background: var(--racing);
      border-radius: 50%;
      animation: pulseDot 1.8s ease infinite;
    }
    .drivers-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(44px, 7vw, 96px);
      font-weight: 800;
      letter-spacing: -0.03em;
      color: var(--ink);
      line-height: 0.95;
      margin-bottom: 20px;
    }
    .drivers-title em { font-style: italic; color: var(--racing); font-weight: 500; }
    .drivers-desc {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: .16em;
      text-transform: uppercase;
      color: var(--ink-3);
      border-top: 1px solid var(--ink);
      padding-top: 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .drivers-count {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: .12em;
      color: var(--ink-3);
    }

    /* ── DRIVER GRID ── */
    .drivers-grid-wrap {
      max-width: 1440px;
      margin: 0 auto;
      padding: 28px 36px 60px;
    }
    .drivers-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
    }

    /* ── DRIVER CARD ── */
    .driver-card {
      background: var(--paper);
      border: 1px solid var(--rule-light);
      border-top: 3px solid var(--team-color, var(--ink-3));
      padding: 22px 20px 16px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform 0.25s cubic-bezier(.2,.8,.2,1), box-shadow 0.25s, border-color 0.25s;
      opacity: 0;
      animation: cardReveal 0.5s cubic-bezier(.25,.9,.3,1) both;
    }
    .driver-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 40px rgba(0,0,0,0.13);
      border-color: var(--team-color, var(--ink));
    }
    .driver-card.is-favorite {
      border-color: var(--gold);
      border-top-color: var(--gold);
    }
    .driver-card.is-favorite::after {
      content: '★';
      position: absolute;
      top: 12px;
      right: 14px;
      color: var(--gold);
      font-size: 13px;
      z-index: 1;
    }

    /* Driver Image */
    .dc-image {
      position: absolute;
      bottom: -10px;
      right: -20px;
      height: 230px;
      object-fit: contain;
      object-position: bottom right;
      z-index: 0;
      opacity: 1;
      pointer-events: none;
      filter: drop-shadow(-5px 5px 15px rgba(0,0,0,0.25));
      transition: transform 0.3s cubic-bezier(.2,.8,.2,1);
    }
    .driver-card:hover .dc-image {
      transform: scale(1.05) translateX(-5px);
    }

    /* Big driver number */
    .dc-number {
      font-family: 'JetBrains Mono', monospace;
      font-size: 54px;
      font-weight: 700;
      color: var(--team-color, var(--ink-3));
      line-height: 1;
      letter-spacing: -0.04em;
      font-variant-numeric: tabular-nums;
      margin-bottom: 6px;
      opacity: 0.9;
      position: relative;
      z-index: 1;
    }

    /* 3-letter code badge */
    .dc-code {
      display: inline-block;
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      font-weight: 700;
      color: #fff;
      background: var(--team-color, var(--ink-3));
      padding: 3px 7px;
      letter-spacing: .08em;
      margin-bottom: 12px;
      position: relative;
      z-index: 1;
    }

    .dc-name {
      font-family: 'Playfair Display', serif;
      font-size: 17px;
      font-weight: 500;
      color: var(--ink);
      letter-spacing: -0.01em;
      line-height: 1.2;
      margin-bottom: 3px;
      position: relative;
      z-index: 1;
    }
    .dc-team {
      font-size: 11px;
      color: var(--ink-3);
      letter-spacing: 0.01em;
      margin-bottom: 14px;
      position: relative;
      z-index: 1;
    }
    .dc-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 11px;
      border-top: 1px solid var(--rule-light);
      position: relative;
      z-index: 1;
    }
    .dc-pos-pts {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      font-weight: 600;
      color: var(--ink-2);
      letter-spacing: .03em;
    }
    .dc-pos-pts .dc-pts { color: var(--ink-3); font-size: 10px; font-weight: 500; margin-left: 4px; }
    @keyframes starPop {
      0% { transform: scale(1); filter: brightness(1); }
      50% { transform: scale(1.4); filter: brightness(1.5); }
      100% { transform: scale(1); filter: brightness(1); }
    }
    .dc-fav-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 15px;
      opacity: 0.3;
      transition: opacity 0.2s, transform 0.2s;
      padding: 4px 2px;
      line-height: 1;
      color: var(--gold);
    }
    .dc-fav-btn:hover  { opacity: 0.7; transform: scale(1.2); }
    .dc-fav-btn.active { opacity: 1; animation: starPop 0.3s cubic-bezier(0.2, 0.8, 0.2, 1); }

    /* Card hover arrow */
    .dc-view-hint {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--team-color, var(--ink));
      color: #fff;
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      letter-spacing: .18em;
      text-transform: uppercase;
      text-align: center;
      padding: 7px;
      font-weight: 600;
      transform: translateY(100%);
      transition: transform 0.22s ease;
    }
    .driver-card:hover .dc-view-hint { transform: translateY(0); }

    /* ── LOADING / EMPTY STATES ── */
    .grid-loading {
      grid-column: 1 / -1;
      text-align: center;
      padding: 80px 20px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--ink-3);
    }

    /* ── DRIVER DETAIL MODAL ── */
    .driver-modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.82);
      z-index: 1000;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 40px 20px 60px;
      overflow-y: auto;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
    }
    .driver-modal-overlay.open {
      opacity: 1;
      pointer-events: all;
    }
    .driver-modal {
      background: var(--carbon);
      width: 100%;
      max-width: 100%;
      min-height: 100vh;
      border-top: 4px solid var(--racing);
      position: relative;
      transform: translateY(32px) scale(0.98);
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .driver-modal-overlay.open .driver-modal {
      transform: translateY(0) scale(1);
    }

    /* Modal header hero */
    .dm-hero {
      padding: 32px 40px 28px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      position: relative;
      overflow: hidden;
    }
    .dm-hero-num {
      position: absolute;
      right: 28px;
      bottom: -10px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 120px;
      font-weight: 700;
      line-height: 1;
      letter-spacing: -0.05em;
      color: rgba(255,255,255,0.05);
      font-variant-numeric: tabular-nums;
      pointer-events: none;
      user-select: none;
    }
    .dm-close-btn {
      position: absolute;
      top: 16px; right: 16px;
      width: 36px; height: 36px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.14);
      color: #fff;
      font-family: 'JetBrains Mono', monospace;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
      z-index: 2;
    }
    .dm-close-btn:hover { background: var(--racing); }
    .dm-eyebrow {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: var(--racing-hot);
      font-weight: 600;
      margin-bottom: 10px;
      position: relative;
      z-index: 1;
    }
    .dm-name {
      font-family: 'Playfair Display', serif;
      font-size: clamp(30px, 5vw, 50px);
      font-weight: 700;
      color: #fff;
      line-height: 1;
      letter-spacing: -0.025em;
      margin-bottom: 12px;
      position: relative;
      z-index: 1;
    }
    .dm-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 18px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: rgba(255,255,255,0.4);
      position: relative;
      z-index: 1;
    }
    .dm-meta-item { display: flex; align-items: center; gap: 6px; }
    .dm-meta-dot {
      width: 5px; height: 5px;
      background: var(--racing);
      border-radius: 50%;
    }

    /* Modal body */
    .dm-body { padding: 28px 40px 36px; }

    .dm-bio {
      font-family: 'Playfair Display', serif;
      font-size: 15px;
      font-style: italic;
      line-height: 1.75;
      color: rgba(255,255,255,0.55);
      border-left: 2px solid var(--racing);
      padding-left: 18px;
      margin-bottom: 32px;
    }

    .dm-section-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
      font-weight: 600;
      margin-bottom: 14px;
    }

    /* Career stat cells */
    .dm-stats-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
      margin-bottom: 32px;
    }
    .dm-stat-cell {
      background: var(--carbon-3);
      border: 1px solid rgba(255,255,255,0.07);
      padding: 16px 14px 14px;
      text-align: center;
    }
    .dm-stat-num {
      font-family: 'JetBrains Mono', monospace;
      font-size: 26px;
      font-weight: 700;
      color: #fff;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      margin-bottom: 7px;
      letter-spacing: -0.02em;
    }
    .dm-stat-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 8px;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
      font-weight: 600;
    }

    /* Season history */
    .dm-history-table {
      width: 100%;
      border-collapse: collapse;
    }
    .dm-history-table th {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
      padding: 0 0 10px;
      text-align: left;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      font-weight: 600;
    }
    .dm-history-table td {
      padding: 10px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: rgba(255,255,255,0.6);
      vertical-align: middle;
    }
    .dm-history-table tr:last-child td { border-bottom: none; }
    .dm-season-year {
      font-weight: 700;
      color: #fff;
      letter-spacing: .04em;
    }
    .dm-season-team { color: rgba(255,255,255,0.45); padding-right: 16px; }
    .dm-season-pos {
      font-weight: 700;
      letter-spacing: .06em;
      text-align: right;
    }
    .dm-pos-1 { color: var(--gold); }
    .dm-pos-2 { color: #c0c0c0; }
    .dm-pos-3 { color: #cd7f32; }
    .dm-season-pts { text-align: right; color: rgba(255,255,255,0.5); }

    /* Skeleton Loading State */
    .dm-loading {
      padding: 24px 0;
      display: flex;
      flex-direction: column;
      gap: 32px;
    }
    @keyframes skeletonShimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }
    .skeleton-line, .skeleton-label, .skeleton-box {
      background: linear-gradient(90deg, rgba(255,255,255,0.03) 25%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.03) 75%);
      background-size: 200% 100%;
      animation: skeletonShimmer 2s infinite linear;
      border-radius: 4px;
    }
    .skeleton-line { height: 14px; margin-bottom: 12px; }
    .skeleton-label { height: 11px; width: 120px; margin-bottom: -16px; }
    .skeleton-box { height: 74px; border-radius: 8px; }

    /* ── FOOTER ── */
    .footer-wrap {
      max-width: 1440px;
      margin: 0 auto;
      padding: 32px 36px 40px;
    }
    .footer {
      border-top: 1px solid var(--ink);
      padding-top: 22px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .f-note {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      color: var(--ink-3);
      letter-spacing: .18em;
      text-transform: uppercase;
    }
    .f-dot {
      display: inline-block;
      width: 4px; height: 4px;
      background: var(--racing);
      vertical-align: middle;
      margin: 0 8px;
      border-radius: 50%;
      position: relative;
      top: -2px;
    }
    .f-brand { font-family: 'Playfair Display', serif; font-size: 15px; font-style: italic; color: var(--ink-2); }
    .f-brand em { color: var(--racing); font-weight: 500; }

    /* ── RESPONSIVE ── */
    @media (max-width: 1200px) {
      .drivers-grid { grid-template-columns: repeat(3, 1fr); }
    }
    @media (max-width: 980px) {
      .drivers-hero, .drivers-grid-wrap, .footer-wrap { padding-left: 20px; padding-right: 20px; }
      .drivers-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
      .dm-stats-grid { grid-template-columns: repeat(3, 1fr); }
      .nav-inner { padding: 0 20px; }
      .dm-hero { padding: 24px 24px 20px; }
      .dm-body { padding: 22px 24px 28px; }
    }
    @media (max-width: 540px) {
      .drivers-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
      .dc-number { font-size: 40px; }
      .dm-stats-grid { grid-template-columns: repeat(2, 1fr); }
      .nav-link { padding: 0 12px; font-size: 9px; }
    }
  </style>
</head>

<body>

  <!-- Navigation -->
  <nav class="site-nav" role="navigation" aria-label="Main navigation">
    <div class="nav-inner">
      <a href="F1_Dashboard.html" class="nav-logo-link">
        <span class="nav-checker"></span>
        <span class="nav-brand-text">Pit <em>Wall</em></span>
      </a>
      <div class="nav-links">
        <a href="F1_Dashboard.html" class="nav-link">Dashboard</a>
        <a href="analytics.html" class="nav-link">Analytics</a>
        <a href="drivers.html" class="nav-link active" aria-current="page">Drivers</a>
        <a href="teams.html" class="nav-link">Teams</a>
      </div>
    </div>
  </nav>

  <!-- Ticker -->
  <div class="ticker-wrap" role="marquee" aria-label="Live ticker">
    <div class="ticker-track" id="tkTrack"></div>
  </div>

  <!-- Hero -->
  <section class="drivers-hero">
    <div class="drivers-eyebrow">2026 Driver Grid</div>
    <h1 class="drivers-title">Driver <em>Profiles</em></h1>
    <div class="drivers-desc">
      <span>Career statistics · Season history · Full grid</span>
      <span class="drivers-count" id="driversCount">Loading...</span>
    </div>
  </section>

  <!-- Driver Grid -->
  <div class="drivers-grid-wrap">
    <div class="drivers-grid" id="driversGrid">
      <div class="grid-loading">· Loading driver grid ·</div>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer-wrap">
    <footer class="footer">
      <div class="f-note"><span class="f-dot"></span>Lights out and away we go</div>
      <div class="f-brand">The <em>Pit Wall</em></div>
    </footer>
  </div>

  <!-- Driver Detail Modal -->
  <div class="driver-modal-overlay" id="driverModal" role="dialog" aria-modal="true" aria-label="Driver profile">
    <div class="driver-modal" id="driverModalInner">
      <!-- Hero -->
      <div class="dm-hero" id="dm-hero">
        <button class="dm-close-btn" id="dmClose" aria-label="Close profile">✕</button>
        <div class="dm-eyebrow" id="dm-eyebrow">◆ Driver Profile</div>
        <div class="dm-name" id="dm-name">Loading...</div>
        <div class="dm-meta" id="dm-meta"></div>
        <div class="dm-hero-num" id="dm-hero-num"></div>
      </div>
      <!-- Body -->
      <div class="dm-body" id="dm-body">
        <div class="dm-loading">
          <div class="dm-loading-dot"></div>
          <div class="dm-loading-text">Fetching career data</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    (function () {
      const t = document.getElementById('tkTrack');
      const mk = () => '<span class="tick"><span class="sym">Driver Grid</span> <span class="val">F1 2026</span></span><span class="tick tick-dot">◆</span>';
      t.innerHTML = Array(14).fill(null).map(mk).join('') + Array(14).fill(null).map(mk).join('');
    })();
  </script>
  <script src="drivers.js?v=2"></script>
</body>

</html>
